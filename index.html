<!DOCTYPE html>
<html>
<head>
  <title>Debit Card Login</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      width: 420px;
      padding: 25px;
      background-color: #000000; /* black background */
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      color: white;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    label {
      font-weight: bold;
      font-size: 14px;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      background-color: #111111;
      color: white;
      box-sizing: border-box;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row input {
      flex: 1;
    }

    .submit-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1c1c1c;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 15px;
      border: none;
      font-weight: bold;
      font-size: 16px;
      color: white;
    }

    .submit-bar:hover {
      background-color: #333333;
    }

    .submit-bar img {
      height: 24px;
      width: 24px;
      margin-right: 12px;
    }

  </style>
</head>
<body>

<div class="card">
  <form>
    <label>Card Number</label>
    <input type="text" placeholder="XXXX XXXX XXXX XXXX" maxlength="19">

    <label>Cardholder Name</label>
    <input type="text" placeholder="John Doe">

    <div class="row">
      <div>
        <label>Exp Date</label>
        <input type="text" placeholder="MM/YY" maxlength="5">
      </div>
      <div>
        <label>CVV</label>
        <input type="text" placeholder="XXX" maxlength="3">
      </div>
    </div>

    <button type="submit" class="submit-bar">
      <img src="https://i.imgur.com/igeEdp3g.jpg" alt="Logo">
      Submit
    </button>
  </form>
</div>

</body>
</html>
